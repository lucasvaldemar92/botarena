name: BotArena CI Full
on:
  push:
    branches:
      - 'homolog'
      - 'main'
jobs:
  test-full:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: botarena-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: botarena-back/package-lock.json
      - run: cp .env.example .env
      - run: npm ci
      - run: node scripts/ci_setup_db.js
      - run: npm run test
      - run: npm run teste-banco
      - run: npm run teste-seg
  sentry-release:
    needs: test-full
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: botarena-back
    steps:
      - uses: actions/checkout@v4
      - name: Sentry Release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
