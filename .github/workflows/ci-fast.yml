name: BotArena CI Fast
on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'qa'
jobs:
  test-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: botarena-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: botarena-back/package-lock.json
      - run: cp .env.example .env
      - run: npm ci
      - run: node scripts/ci_setup_db.js
      - run: npm run test
      - run: npm run teste-banco
      - run: npm run teste-seg
