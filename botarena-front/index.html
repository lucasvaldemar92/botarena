<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Manager Pro</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">
    <!-- Navbar -->
    <header class="navbar">
        <div class="navbar__container">
            <a href="#" class="navbar__logo" data-testid="link-logo">
                <i class="fa-solid fa-qrcode"></i> QR <span>Manager Pro</span>
            </a>
            <div class="navbar__actions">
                <a href="https://github.com" target="_blank" class="navbar__icon-link" data-testid="link-github"
                    aria-label="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <!-- Hero Section -->
        <section class="hero fade-in-section">
            <h1 class="hero__title">Create & Manage <span>Intelligent QR Codes</span></h1>
            <p class="hero__subtitle">Generate standard and dynamic QR codes seamlessly. Best-in-class tool for premium
                code generation.</p>
        </section>

        <!-- Generation Panel -->
        <section class="generate-panel glass-panel zoom-in-section">
            <div class="generate-form">
                <h2 class="generate-form__title">Generate New QR</h2>
                <div class="generate-form__group">
                    <label for="qr-text" class="generate-form__label">Enter URL, Text, or Data</label>
                    <input type="text" id="qr-text" class="generate-form__input" placeholder="https://example.com"
                        data-testid="input-qr-text">
                </div>
                <div class="generate-form__group">
                    <label for="qr-label" class="generate-form__label">Label (Optional)</label>
                    <input type="text" id="qr-label" class="generate-form__input" placeholder="My Website"
                        data-testid="input-qr-label">
                </div>

                <div class="generate-form__actions">
                    <!-- Template Expert-Executor Applied -->
                    <button class="btn-animado" data-testid="btn-generate-qr" id="generate-qr"
                        aria-label="Generate QR Code">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate QR Code
                    </button>
                </div>
            </div>
            <div class="generate-preview">
                <div class="generate-preview__box" id="preview-box" data-testid="box-preview">
                    <!-- QR Code will be drawn here -->
                    <div class="generate-preview__placeholder">
                        <i class="fa-solid fa-qrcode"></i>
                        <p>Preview appears here</p>
                    </div>
                </div>
                <div class="generate-preview__actions">
                    <button class="btn-animado btn-secondary" data-testid="btn-save-qr" id="save-qr"
                        aria-label="Save QR Code" disabled>
                        <i class="fa-solid fa-floppy-disk"></i> Save to Library
                    </button>
                </div>
            </div>
        </section>

        <!-- History/Dashboard Section -->
        <section class="dashboard fade-in-section">
            <div class="dashboard__header">
                <h2 class="dashboard__title">Your QR Library</h2>
                <span class="dashboard__count" id="library-count" data-testid="text-library-count">0 items</span>
            </div>

            <div class="grid qr-grid" id="qr-grid" data-testid="grid-qr-codes">
                <!-- QR Cards will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer__text">&copy; 2026 QR Manager Pro. Expert-Executor Standard.</p>
    </footer>

    <!-- QRCode Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
